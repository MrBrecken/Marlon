<!DOCTYPE html>
<html>
<head>
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    <style>
        body { background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .btn { padding: 15px 30px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <button class="btn" id="launch">Launch Game</button>
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.3/dist/uv.bundle.js"></script>
    <script src="uv.config.js"></script>
    <script>
        document.getElementById('launch').onclick = async () => {
            if ('serviceWorker' in navigator) {
                await navigator.serviceWorker.register('./uv.sw.js', { scope: __uv$config.prefix });
            }
            const win = window.open('about:blank', '_blank');
            const proxiedUrl = __uv$config.prefix + __uv$config.encodeUrl(window.location.origin + '/game.html');
            const iframe = win.document.createElement('iframe');
            iframe.style = "position:fixed;top:0;left:0;width:100%;height:100%;border:none;";
            iframe.src = proxiedUrl;
            win.document.body.appendChild(iframe);
        };
    </script>
</body>
</html>
