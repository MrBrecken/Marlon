<!DOCTYPE html>
<html>
<head>
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    <style>
        body { 
            background: #111; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .btn { 
            padding: 15px 40px; 
            background: #2e7d32; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover { 
            background: #388e3c; 
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Mathematics Session</h1>
    <button class="btn" id="launch">Join Activity</button>
    
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.2.3/dist/uv.bundle.js"></script>
    <script src="/uv.config.js"></script>
    
    <script>
        // Force HTTPS because Service Workers won't register on HTTP
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            location.replace(`https:${location.href.substring(location.protocol.length)}`);
        }

        const btn = document.getElementById('launch');

        btn.onclick = async () => {
            btn.innerText = "Launching...";
            
            if ('serviceWorker' in navigator) {
                try {
                    // Register the worker at the root of computerco.info
                    await navigator.serviceWorker.register('/uv.sw.js', { 
                        scope: '/service/' 
                    });
                } catch (err) {
                    alert("Proxy Error: " + err.message + ". Make sure Enforce HTTPS is ON in GitHub settings.");
                    btn.innerText = "Join Activity";
                    return;
                }
            }

            // Open the cloaked window
            const win = window.open('about:blank', '_blank');
            if (!win) {
                alert("Pop-up blocked! Please allow pop-ups for this site.");
                btn.innerText = "Join Activity";
                return;
            }

            // The target URL to unblock
            const targetUrl = 'https://eaglercraft.com/play/?version=1.12.2';
            
            // Encode the URL using the Ultraviolet codec
            const proxiedUrl = '/service/' + __uv$config.encodeUrl(targetUrl);

            // Create and inject the fullscreen iframe
            const iframe = win.document.createElement('iframe');
            iframe.style.position = "fixed";
            iframe.style.top = "0";
            iframe.style.left = "0";
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.border = "none";
            iframe.style.background = "#000";
            iframe.src = proxiedUrl;
            
            win.document.body.style.margin = "0";
            win.document.body.appendChild(iframe);
            
            btn.innerText = "Join Activity";
        };
    </script>
</body>
</html>
