<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Classroom</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/classroom/favicon.png">
    <style>
        body { 
            background: #111; color: white; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; 
        }
        .btn { 
            padding: 15px 40px; background: #2e7d32; color: white; 
            border: none; border-radius: 8px; cursor: pointer; 
            font-size: 1.2rem; font-weight: bold; transition: 0.2s;
        }
        .btn:hover { background: #388e3c; transform: scale(1.05); }
        .btn:disabled { background: #555; }
    </style>
</head>
<body>

    <h1>Mathematics Session</h1>
    <button class="btn" id="launch">Join Activity</button>

    <script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@latest/dist/bundle.js"></script>
    <script src="/scramjet.config.js"></script>

    <script>
        const btn = document.getElementById('launch');

        // Simple XOR codec to match Scramjet config
        const xor = {
            encode(str) {
                if (!str) return str;
                return encodeURIComponent(str.split('').map((char, ind) => ind % 2 ? String.fromCharCode(char.charCodeAt() ^ 2) : char).join(''));
            },
            decode(str) {
                if (!str) return str;
                let [reversed, ...search] = str.split('?');
                return decodeURIComponent(reversed).split('').map((char, ind) => ind % 2 ? String.fromCharCode(char.charCodeAt() ^ 2) : char).join('') + (search.length ? '?' + search.join('?') : '');
            }
        };

        btn.onclick = async () => {
            btn.disabled = true;
            btn.innerText = "Syncing...";

            if ('serviceWorker' in navigator) {
                try {
                    await navigator.serviceWorker.register('/sw.js', {
                        scope: '/service/'
                    });
                    await navigator.serviceWorker.ready;
                } catch (err) {
                    alert("Worker Error: " + err.message);
                    btn.disabled = false;
                    return;
                }
            }

            const win = window.open('about:blank', '_blank');
            if (!win) {
                alert("Pop-up blocked!");
                btn.disabled = false;
                return;
            }

            // Target Game URL
            const targetUrl = 'https://eaglercraft.com/play/?version=1.12.2';
            const proxiedUrl = '/service/' + xor.encode(targetUrl);

            const doc = win.document;
            doc.title = "Google Classroom";
            doc.body.style.margin = "0";
            doc.body.style.background = "#000";

            const iframe = doc.createElement('iframe');
            iframe.style = "position:fixed;top:0;left:0;width:100%;height:100%;border:none;";
            iframe.src = proxiedUrl;
            
            doc.body.appendChild(iframe);
            btn.disabled = false;
            btn.innerText = "Join Activity";
        };
    </script>
</body>
</html>
